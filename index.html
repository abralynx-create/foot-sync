        <title>Foot Sync - Live Scores</title>
        <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; color: #fff; text-align: center; padding: 10px; margin: 0; }
